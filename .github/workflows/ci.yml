name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cross-compiler image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aeldrec2-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build all binaries
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            aeldrec2-builder

      - name: Upload compiled tools
        uses: actions/upload-artifact@v4
        with:
          name: compiled-tools
          path: output/compiled/
          retention-days: 3

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wine with 32-bit support
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y wine wine32

      - name: Download compiled tools
        uses: actions/download-artifact@v4
        with:
          name: compiled-tools
          path: windows/

      - name: Install Python test dependencies
        run: pip install pytest requests

      - name: Run tests
        env:
          WINEDEBUG: -all
          DISPLAY: ""
        run: python3 -m pytest tests/ -v --tb=short -p no:cacheprovider
