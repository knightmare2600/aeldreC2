name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  # ------------------------------------------------------------------
  # 1. Build all binaries and produce bundled installers
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cross-compiler image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: aeldrec2-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build binaries and bundle installers
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            aeldrec2-builder \
            wmake -f Makefile.wc dist \
              "XFLAGS=-DAELDRE_VERSION=\"${{ inputs.version }}\""

      - name: Upload compiled tools
        uses: actions/upload-artifact@v4
        with:
          name: compiled-tools
          path: output/compiled/
          retention-days: 7

      - name: Upload setup installers
        uses: actions/upload-artifact@v4
        with:
          name: setup-installers
          path: output/exe/
          retention-days: 7

  # ------------------------------------------------------------------
  # 2. Run test suite against the built binaries under Wine
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download compiled tools
        uses: actions/download-artifact@v4
        with:
          name: compiled-tools
          path: windows/

      - name: Install Wine + test dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wine-stable python3-pytest python3-requests xz-utils
          WINEDEBUG=-all DISPLAY= wineboot --init 2>/dev/null || true

      - name: Run test suite
        env:
          WINEDEBUG: "-all"
          DISPLAY: ""
        run: python3 -m pytest tests/ -v --tb=short -p no:cacheprovider

  # ------------------------------------------------------------------
  # 3. Package and publish GitHub release
  # ------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download compiled tools
        uses: actions/download-artifact@v4
        with:
          name: compiled-tools
          path: output/compiled/

      - name: Download setup installers
        uses: actions/download-artifact@v4
        with:
          name: setup-installers
          path: output/exe/

      - name: Build tools ZIP
        run: |
          cd output/compiled
          zip -j "../../aeldreC2-${{ inputs.version }}-tools.zip" *
          echo "--- tools ZIP contents ---"
          unzip -l "../../aeldreC2-${{ inputs.version }}-tools.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "ÆldreC2 v${{ inputs.version }}"
          prerelease: ${{ inputs.prerelease }}
          body: |
            ## ÆldreC2 v${{ inputs.version }}

            Retro C2 framework targeting Windows 3.11 / Win32s / Windows NT 3.x–4.

            ### Installers

            | File | Description |
            |------|-------------|
            | `setup16.exe` | Win16 self-extracting installer — runs on WFW 3.11 / Windows 3.1 |
            | `setup32.exe` | Win32 self-extracting installer — runs on Win32s / Win95 / NT 3.1+ |

            ### Tools (individual binaries — also in `setup16.exe` / `setup32.exe`)

            **C2 tools**
            | Binary | Platform |
            |--------|----------|
            | `joshua.exe` | Win32s / NT / 95 — C2 controller |
            | `tank.exe` | Win32s / NT / 95 — connect-back implant |
            | `tank16.exe` | Win 3.1 / WFW 3.11 — 16-bit implant |
            | `clu.exe` | Win32s / NT / 95 — implant generator |
            | `ncwfw.exe` | Win32s / NT / 95 — netcat relay |
            | `grid.exe` | Win32s / NT / 95 — port scanner |
            | `ipcalc32.exe` | Win32s / NT / 95 — subnet calculator |
            | `ipcalc16.exe` | Win 3.1 / WFW 3.11 — subnet calculator |
            | `markuped.exe` | Win32s / NT / 95 — Markdown editor |
            | `wget.exe` | Win32s / NT / 95 — HTTP/HTTPS/FTP downloader |
            | `wget16.exe` | Win 3.1 / WFW 3.11 — HTTP downloader |
            | `lightman.exe` | Win32s / NT / 95 — lateral movement |
            | `flynn.exe` | Win32s / NT / 95 — operator shell |

            **PuTTY suite (Win32s-compatible build)**
            `putty.exe` `puttytel.exe` `puttygen.exe` `pageant.exe` `winsftp.exe`

            > For authorised engagements, CTF, and educational use only.
          files: |
            output/exe/setup16.exe
            output/exe/setup32.exe
            aeldreC2-${{ inputs.version }}-tools.zip
          draft: false
